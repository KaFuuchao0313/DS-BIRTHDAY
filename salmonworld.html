    let currentStep = 0;
    let isTyping = false;
    let typingTimer = null;
    let isTransitioning = false;

    function handleNext() {
        if(isTransitioning) return;
        if (isTyping) {
            finishTyping();
            return;
        }

        if (currentStep >= script.length) {
            alert("另一个世界再会。");
            return;
        }

        const data = script[currentStep];
        const video = document.getElementById('video-background');
        const displayArea = document.getElementById('text-display');

        let needChangeVideo=false;

        if (data.bgVideo) {
            const currentSrc = video.src || "";
            if(data.bgVideo) {
                if (data.bgVideo === "none") {
                    video.style.opacity = "0";
                    setTimeout(() => { video.src = ""; });
                }
                else if (!currentSrc.endsWith(data.bgVideo)) {
                    needChangeVideo = true;
                }
            }
        }

        if (needChangeVideo) {
            isTransitioning = true;
            video.style.opacity = "0";
            displayArea.style.opacity = "0";
            
            setTimeout(() => {
                video.src = data.bgVideo;
                /*cover抖动效果*/
                if (data.type === 'cover') {
                    video.classList.add('video-shake');
                } else {
                    video.classList.remove('video-shake');
                }
                video.load();
                let playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => { console.log("世界崩坏中:", error); });
                }

                updateElements(data);
                video.style.opacity = "1";
                displayArea.style.opacity = "1";

                isTransitioning=false;
            }, 500); 
        } else {
            if (data.type === 'cover') {
                video.classList.add('video-shake');
            } else {
                video.classList.remove('video-shake');
            }
            updateElements(data);

            video.style.opacity="1";
        }
        currentStep++;
    }

    function updateElements(data) {
        /*打字*/
        showText(data.text, data.type);
    }

    function showText(text, type) {
        const display = document.getElementById('text-display');
        display.innerHTML = "";

        clearInterval(typingTimer);
        if(!text) return;
        const el = document.createElement('div');
        if (type === 'dialogue') {
            el.className = 'subtitle typing-active';
        } else {
            el.className = 'monologue typing-active';
        }
        display.appendChild(el);

        let i = 0;
        isTyping = true;

        typingTimer = setInterval(() => {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
            } else {
                clearInterval(typingTimer);
                isTyping = false;
            }
        }, 60);
    }

    function finishTyping() {
        clearInterval(typingTimer);
        const active = document.querySelector('.typing-active');
        if (active) {
            active.innerHTML = script[currentStep - 1].text;
        }
        isTyping = false;
    }

    window.onload = () => {
        console.log("页面已加载，等待用户点击...");
    };
</script>
